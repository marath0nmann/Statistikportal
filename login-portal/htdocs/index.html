<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Login</title>
<link rel="icon" href="data:,">
<style>
/* ── CSS Variables (überschrieben durch Vereinsfarben) ─── */
:root {
  --primary: #cc0000;
  --accent: #003087;
  --bg: #f0f2f6;
  --surf: #ffffff;
  --surf2: #f7f8fa;
  --text: #1a1d23;
  --text2: #6b7280;
  --border: #e2e5ea;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
  --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --surf: #1a1d26;
    --surf2: #232730;
    --text: #e8eaef;
    --text2: #8b92a0;
    --border: #2d313a;
    --shadow: 0 2px 16px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
  }
}

/* ── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 20px;
  overflow-y: auto;
}

/* ── Background Pattern ───────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, color-mix(in srgb, var(--primary) 6%, transparent) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── Card ─────────────────────────────────────────────── */
.portal-card {
  position: relative;
  z-index: 1;
  background: var(--surf);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  padding: 40px 36px 36px;
  animation: cardIn .4s ease-out;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to   { opacity: 1; transform: none; }
}

/* ── Logo & Header ────────────────────────────────────── */
.portal-logo {
  text-align: center;
  margin-bottom: 8px;
}
.portal-logo img {
  height: 56px;
  object-fit: contain;
}
.portal-logo .logo-placeholder {
  width: 56px; height: 56px;
  border-radius: 12px;
  background: var(--primary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
  color: #fff;
}
.portal-title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.portal-sub {
  text-align: center;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 28px;
}

/* ── Form Elements ────────────────────────────────────── */
.field-group { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 6px;
}
.field-input {
  width: 100%;
  padding: 12px 14px;
  font-size: 15px;
  font-family: var(--font);
  background: var(--surf2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
}
.field-input::placeholder { color: var(--text2); opacity: .6; }

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; filter: none; }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  font-size: 13px;
}
.btn-ghost:hover { color: var(--text); background: var(--surf2); }
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover { filter: brightness(1.1); }
.btn-link {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  padding: 4px 0;
  text-decoration: none;
}
.btn-link:hover { text-decoration: underline; }

/* ── Error & Info ─────────────────────────────────────── */
.msg-error {
  background: #fde8e8;
  color: #cc0000;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  display: none;
}
.msg-info {
  background: color-mix(in srgb, var(--accent) 10%, var(--surf2));
  color: var(--accent);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
@media (prefers-color-scheme: dark) {
  .msg-error { background: #3a1515; color: #ff6b6b; }
  .msg-info  { background: #15203a; color: #6b9bff; }
}

/* ── App Grid (nach Login) ────────────────────────────── */
.app-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 20px;
}
.app-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--surf2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: var(--text);
  transition: all .2s;
  cursor: pointer;
}
.app-card:hover {
  border-color: var(--primary);
  box-shadow: 0 2px 12px color-mix(in srgb, var(--primary) 15%, transparent);
  transform: translateY(-2px);
}
.app-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.app-card-text { flex: 1; min-width: 0; }
.app-card-name { font-size: 14px; font-weight: 600; }
.app-card-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── Divider ──────────────────────────────────────────── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  font-size: 12px;
  color: var(--text2);
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── QR-Code ──────────────────────────────────────────── */
.qr-wrap {
  text-align: center;
  margin: 16px 0;
}
.qr-wrap img {
  width: 180px;
  height: 180px;
  border-radius: 8px;
  background: #fff;
  padding: 8px;
}
.secret-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: monospace;
  font-size: 12px;
  color: var(--text2);
  background: var(--surf2);
  padding: 8px 12px;
  border-radius: 8px;
  margin: 8px 0 16px;
  word-break: break-all;
}
.secret-box .copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
}

/* ── Backup Codes ─────────────────────────────────────── */
.backup-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin: 12px 0;
}
.backup-code {
  font-family: monospace;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  padding: 8px;
  background: var(--surf2);
  border-radius: 6px;
  color: var(--text);
  letter-spacing: 1px;
}

/* ── User Greeting ────────────────────────────────────── */
.user-greeting {
  text-align: center;
  margin-bottom: 4px;
}
.user-greeting .hello {
  font-size: 22px;
  font-weight: 700;
}
.user-greeting .email {
  font-size: 13px;
  color: var(--text2);
  margin-top: 2px;
}

/* ── Spinner ──────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px;
  border: 2.5px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Mobile ───────────────────────────────────────────── */
@media (max-width: 480px) {
  body { padding: 12px; align-items: flex-start; padding-top: 10vh; }
  .portal-card { padding: 28px 24px 24px; }
}
</style>
</head>
<body>

<div class="portal-card" id="portal">
  <div style="text-align:center;padding:32px 0"><div class="spinner"></div></div>
</div>

<script>
(function() {
  'use strict';

  var API = 'api/index.php';
  var config = {};
  var currentUser = null;
  var apps = [];

  // ── URL-Parameter ──────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var redirectUrl = params.get('redirect') || '';
  // App-Name aus redirect ableiten
  var redirectLabel = '';
  if (redirectUrl) {
    try { redirectLabel = new URL(redirectUrl).hostname; } catch(e) {}
  }

  // ── API-Helfer ─────────────────────────────────────────
  async function api(method, path, body) {
    var opts = { method: method, credentials: 'same-origin', headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    var url = API + '?_route=' + encodeURIComponent(path);
    try {
      var r = await fetch(url, opts);
      var text = await r.text();
      try { return JSON.parse(text); }
      catch(e) { return { ok: false, fehler: 'Server-Fehler' }; }
    } catch(e) { return { ok: false, fehler: 'Verbindungsfehler' }; }
  }

  // ── Render-Helfer ──────────────────────────────────────
  var el = document.getElementById('portal');
  function h(html) { el.innerHTML = html; }

  function logoHtml() {
    if (config.logo_datei) {
      // Logo-Pfad: relativ zur Statistikportal-Installation
      var src = config.logo_datei;
      // Wenn der Pfad relativ ist und wir auf dem Login-Portal sind,
      // versuchen wir den absoluten Pfad über die erste registrierte App
      if (!src.startsWith('http') && apps.length) {
        src = apps[0].url.replace(/\/+$/, '') + '/' + src;
      }
      return '<div class="portal-logo"><img src="' + esc(src) + '" alt="" onerror="this.parentNode.innerHTML=logoPlaceholder()"></div>';
    }
    return '<div class="portal-logo">' + logoPlaceholder() + '</div>';
  }
  function logoPlaceholder() {
    var k = (config.verein_kuerzel || config.verein_name || 'P').charAt(0).toUpperCase();
    return '<div class="logo-placeholder">' + k + '</div>';
  }
  function titleHtml(sub) {
    return '<div class="portal-title">' + esc(config.verein_kuerzel || config.verein_name || 'Login') + '</div>' +
           '<div class="portal-sub">' + esc(sub || 'Anmelden') + '</div>';
  }
  function errHtml(id) { return '<div class="msg-error" id="' + (id||'err') + '"></div>'; }
  function showErr(msg, id) {
    var e = document.getElementById(id || 'err');
    if (e) { e.textContent = msg; e.style.display = 'block'; }
  }
  function hideErr(id) {
    var e = document.getElementById(id || 'err');
    if (e) e.style.display = 'none';
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function focus(id) { setTimeout(function(){ var e = document.getElementById(id); if (e) e.focus(); }, 80); }
  function disable(btnId) { var b = document.getElementById(btnId); if(b){ b.disabled=true; b._t=b.innerHTML; b.innerHTML='<span class="spinner"></span>'; } }
  function enable(btnId) { var b = document.getElementById(btnId); if(b){ b.disabled=false; if(b._t) b.innerHTML=b._t; } }

  // ── Farben anwenden ────────────────────────────────────
  function applyColors() {
    if (config.farbe_primary) document.documentElement.style.setProperty('--primary', config.farbe_primary);
    if (config.farbe_accent)  document.documentElement.style.setProperty('--accent', config.farbe_accent);
    // Titel
    document.title = (config.verein_kuerzel || config.verein_name || 'Login') + ' – Anmelden';
  }

  // ══════════════════════════════════════════════════════
  // SCREENS
  // ══════════════════════════════════════════════════════

  // ── Login Step 1: Identifier ───────────────────────────
  var _login = { ident: '', hasPasskey: false };

  function screenLogin() {
    h(logoHtml() + titleHtml(redirectLabel ? 'Anmelden bei ' + redirectLabel : 'Anmelden') +
      errHtml() +
      '<div class="field-group">' +
        '<label class="field-label" for="f-ident">E-Mail-Adresse</label>' +
        '<input class="field-input" id="f-ident" type="email" autocomplete="username webauthn" placeholder="name@beispiel.de">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn1" onclick="LP.doIdentify()">Weiter &#x2192;</button>' +
      '<div class="divider">oder</div>' +
      '<button class="btn btn-ghost" onclick="LP.screenRegister()">Konto erstellen</button>' +
      '<button class="btn-link" style="display:block;text-align:center;margin-top:12px" onclick="LP.screenReset()">Passwort vergessen?</button>'
    );
    focus('f-ident');
    document.getElementById('f-ident').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.doIdentify();
    });
  }

  async function doIdentify() {
    hideErr();
    var ident = (document.getElementById('f-ident').value || '').trim();
    if (!ident) { showErr('Bitte E-Mail-Adresse eingeben.'); return; }
    _login.ident = ident;
    disable('btn1');
    var r = await api('POST', 'auth/identify', { ident: ident });
    enable('btn1');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler'); return; }
    _login.hasPasskey = !!(r.data && r.data.has_passkey);
    screenPassword();
  }

  // ── Login Step 2: Password ─────────────────────────────
  function screenPassword() {
    h(logoHtml() + titleHtml(_login.ident) +
      errHtml() +
      '<div class="field-group">' +
        '<label class="field-label" for="f-pw">Passwort</label>' +
        '<input class="field-input" id="f-pw" type="password" autocomplete="current-password">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn2" onclick="LP.doLogin()">Anmelden</button>' +
      (_login.hasPasskey ? '<button class="btn btn-accent" style="margin-top:10px" onclick="LP.doPasskeyAuth()">&#x1F511; Mit Passkey anmelden</button>' : '') +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screenLogin()">&larr; Zurück</button>'
    );
    focus('f-pw');
    document.getElementById('f-pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.doLogin();
    });
  }

  async function doLogin() {
    hideErr();
    var pw = document.getElementById('f-pw').value;
    if (!pw) { showErr('Bitte Passwort eingeben.'); return; }
    disable('btn2');
    var r = await api('POST', 'auth/login', { benutzername: _login.ident, passwort: pw });
    enable('btn2');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler'); return; }
    if (r.data && r.data.totp_required) {
      if (r.data.totp_setup) {
        screenTotpSetup();
      } else {
        screen2FA(r.data);
      }
      return;
    }
    loginSuccess(r.data);
  }

  // ── Login Step 3: 2FA ──────────────────────────────────
  var _2fa = {};
  function screen2FA(data) {
    _2fa = data || {};
    var methods = [];
    if (_2fa.has_totp)    methods.push('<button class="btn btn-primary" id="btn-totp-go" onclick="LP.show2FACode()">&#x1F4F1; Authenticator-Code</button>');
    if (_2fa.has_passkey) methods.push('<button class="btn btn-accent" onclick="LP.doPasskeyAuth()">&#x1F511; Passkey verwenden</button>');
    if (_2fa.email_login_bevorzugt || (!_2fa.has_totp && !_2fa.has_passkey))
      methods.push('<button class="btn btn-ghost" onclick="LP.sendEmailCode()">&#x2709;&#xFE0E; Code per E-Mail</button>');

    h(logoHtml() + titleHtml('Zwei-Faktor-Authentifizierung') +
      '<div class="msg-info">Wähle eine Methode zur Bestätigung deiner Identität.</div>' +
      errHtml() +
      '<div style="display:flex;flex-direction:column;gap:10px">' + methods.join('') + '</div>' +
      '<button class="btn btn-ghost" style="margin-top:12px" onclick="LP.screenLogin()">&larr; Zurück</button>'
    );
  }

  function show2FACode() {
    h(logoHtml() + titleHtml('Code eingeben') +
      errHtml() +
      '<div class="field-group">' +
        '<label class="field-label" for="f-code">6-stelliger Code</label>' +
        '<input class="field-input" id="f-code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn3" onclick="LP.verifyTotp()">Bestätigen</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screen2FA(LP._2fa)">&larr; Andere Methode</button>'
    );
    focus('f-code');
    document.getElementById('f-code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.verifyTotp();
    });
  }

  async function verifyTotp() {
    hideErr();
    var code = (document.getElementById('f-code').value || '').trim();
    if (!code) { showErr('Bitte Code eingeben.'); return; }
    disable('btn3');
    var r = await api('POST', 'auth/totp-verify', { code: code });
    enable('btn3');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Ungültiger Code'); return; }
    loginSuccess(r.data);
  }

  async function doPasskeyAuth() {
    try {
      // Challenge anfordern
      var cr = await api('POST', 'auth/passkey-auth-challenge', {});
      if (!cr || !cr.ok) { alert((cr && cr.fehler) || 'Passkey-Fehler'); return; }
      var opts = cr.data;
      opts.challenge = Uint8Array.from(atob(opts.challenge), function(c){ return c.charCodeAt(0); });
      if (opts.allowCredentials) {
        opts.allowCredentials = opts.allowCredentials.map(function(c) {
          c.id = Uint8Array.from(atob(c.id), function(x){ return x.charCodeAt(0); });
          return c;
        });
      }
      var assertion = await navigator.credentials.get({ publicKey: opts });
      var cred = {
        id: assertion.id,
        rawId: btoa(String.fromCharCode.apply(null, new Uint8Array(assertion.rawId))),
        type: assertion.type,
        response: {
          authenticatorData: btoa(String.fromCharCode.apply(null, new Uint8Array(assertion.response.authenticatorData))),
          clientDataJSON: btoa(String.fromCharCode.apply(null, new Uint8Array(assertion.response.clientDataJSON))),
          signature: btoa(String.fromCharCode.apply(null, new Uint8Array(assertion.response.signature))),
        }
      };
      if (assertion.response.userHandle) {
        cred.response.userHandle = btoa(String.fromCharCode.apply(null, new Uint8Array(assertion.response.userHandle)));
      }
      var vr = await api('POST', 'auth/passkey-auth-verify', { credential: cred });
      if (!vr || !vr.ok) { alert((vr && vr.fehler) || 'Passkey-Verifizierung fehlgeschlagen'); return; }
      loginSuccess(vr.data);
    } catch(e) {
      if (e.name !== 'NotAllowedError') alert('Passkey-Fehler: ' + e.message);
    }
  }

  async function sendEmailCode() {
    var r = await api('POST', 'auth/email-code-send', {});
    if (!r || !r.ok) { alert((r && r.fehler) || 'Fehler'); return; }
    screenEmailCode();
  }

  function screenEmailCode() {
    h(logoHtml() + titleHtml('E-Mail-Code eingeben') +
      '<div class="msg-info">Wir haben einen Code an deine E-Mail-Adresse gesendet.</div>' +
      errHtml() +
      '<div class="field-group">' +
        '<label class="field-label" for="f-ecode">6-stelliger Code</label>' +
        '<input class="field-input" id="f-ecode" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-ec" onclick="LP.verifyEmailCode()">Bestätigen</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.sendEmailCode()">Code erneut senden</button>' +
      '<button class="btn btn-ghost" onclick="LP.screen2FA(LP._2fa)">&larr; Andere Methode</button>'
    );
    focus('f-ecode');
    document.getElementById('f-ecode').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.verifyEmailCode();
    });
  }

  async function verifyEmailCode() {
    hideErr();
    var code = (document.getElementById('f-ecode').value || '').trim();
    if (!code) { showErr('Bitte Code eingeben.'); return; }
    disable('btn-ec');
    var r = await api('POST', 'auth/email-code-verify', { code: code });
    enable('btn-ec');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler'); return; }
    loginSuccess(r.data);
  }

  // ── TOTP Setup (bei erster Anmeldung) ──────────────────
  async function screenTotpSetup() {
    h(logoHtml() + titleHtml('2FA einrichten') +
      '<div class="msg-info">Für die Sicherheit deines Kontos musst du eine Zwei-Faktor-Authentifizierung einrichten.</div>' +
      '<div style="text-align:center;padding:20px 0"><div class="spinner"></div></div>'
    );
    var r = await api('GET', 'auth/totp-setup', null);
    if (!r || !r.ok) { h(logoHtml() + '<div class="msg-error" style="display:block">' + esc((r && r.fehler) || 'Fehler') + '</div>'); return; }
    var d = r.data;
    h(logoHtml() + titleHtml('Authenticator einrichten') +
      '<div class="msg-info">Scanne den QR-Code mit deiner Authenticator-App (Google Authenticator, Authy, etc.).</div>' +
      '<div class="qr-wrap"><img src="' + esc(d.qr_url) + '" alt="QR"></div>' +
      '<div class="secret-box"><span id="totp-secret">' + esc(d.secret) + '</span><button class="copy-btn" onclick="LP.copySecret()">&#x1F4CB;</button></div>' +
      errHtml('totp-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-totp-code">Code aus der App</label>' +
        '<input class="field-input" id="f-totp-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-totp-confirm" onclick="LP.confirmTotpSetup()">Bestätigen</button>'
    );
    focus('f-totp-code');
    document.getElementById('f-totp-code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.confirmTotpSetup();
    });
  }

  async function confirmTotpSetup() {
    hideErr('totp-err');
    var code = (document.getElementById('f-totp-code').value || '').trim();
    if (!code) { showErr('Bitte Code eingeben.', 'totp-err'); return; }
    disable('btn-totp-confirm');
    var r = await api('POST', 'auth/totp-setup', { code: code });
    enable('btn-totp-confirm');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Ungültiger Code', 'totp-err'); return; }
    if (r.data && r.data.backup_codes) {
      screenBackupCodes(r.data.backup_codes, r.data);
    } else {
      loginSuccess(r.data);
    }
  }

  function screenBackupCodes(codes, loginData) {
    var grid = codes.map(function(c){ return '<div class="backup-code">' + esc(c) + '</div>'; }).join('');
    h(logoHtml() + titleHtml('Backup-Codes sichern') +
      '<div class="msg-info">Speichere diese Codes sicher ab. Du kannst sie verwenden, wenn du keinen Zugang zu deiner Authenticator-App hast.</div>' +
      '<div class="backup-grid">' + grid + '</div>' +
      '<button class="btn btn-primary" onclick="LP.loginSuccess(LP._backupLoginData)">Weiter</button>'
    );
    window.LP._backupLoginData = loginData;
  }

  function copySecret() {
    var s = document.getElementById('totp-secret');
    if (s && navigator.clipboard) {
      navigator.clipboard.writeText(s.textContent);
    }
  }

  // ── Login Success ──────────────────────────────────────
  function loginSuccess(data) {
    currentUser = data;
    if (redirectUrl) {
      // Direkt zur anfragenden App weiterleiten
      window.location.href = redirectUrl;
      return;
    }
    screenAppSelector();
  }

  // ── App-Auswahl ────────────────────────────────────────
  function screenAppSelector() {
    var name = currentUser.vorname || currentUser.name || '';
    var greeting = name ? 'Hallo, ' + name + '!' : 'Angemeldet!';
    var appCards = '';
    for (var i = 0; i < apps.length; i++) {
      var a = apps[i];
      appCards += '<a class="app-card" href="' + esc(a.url) + '">' +
        '<div class="app-icon" style="background:' + esc(a.farbe || 'var(--primary)') + ';color:#fff">' + esc(a.icon || '📊') + '</div>' +
        '<div class="app-card-text">' +
          '<div class="app-card-name">' + esc(a.name) + '</div>' +
          (a.beschreibung ? '<div class="app-card-desc">' + esc(a.beschreibung) + '</div>' : '') +
        '</div>' +
        '<span style="color:var(--text2)">&#x2192;</span>' +
      '</a>';
    }
    if (!appCards) {
      appCards = '<div class="msg-info">Keine Apps konfiguriert. Bitte Login-Portal-Apps in den Einstellungen anlegen.</div>';
    }

    h(logoHtml() +
      '<div class="user-greeting"><div class="hello">' + esc(greeting) + '</div>' +
        '<div class="email">' + esc(currentUser.email || currentUser.name || '') + '</div>' +
      '</div>' +
      '<div class="app-grid">' + appCards + '</div>' +
      '<button class="btn btn-ghost" style="margin-top:16px" onclick="LP.doLogout()">Abmelden</button>'
    );
  }

  async function doLogout() {
    await api('POST', 'auth/logout', {});
    currentUser = null;
    screenLogin();
  }

  // ══════════════════════════════════════════════════════
  // REGISTRIERUNG
  // ══════════════════════════════════════════════════════
  var _reg = { email: '', name: '', step: 1 };

  function screenRegister() {
    _reg = { email: '', name: '', step: 1 };
    h(logoHtml() + titleHtml('Konto erstellen') +
      errHtml('reg-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reg-email">E-Mail-Adresse</label>' +
        '<input class="field-input" id="f-reg-email" type="email" placeholder="name@beispiel.de">' +
      '</div>' +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reg-name">Name</label>' +
        '<input class="field-input" id="f-reg-name" type="text" placeholder="Vor- und Nachname">' +
      '</div>' +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reg-pw">Passwort (mind. 8 Zeichen)</label>' +
        '<input class="field-input" id="f-reg-pw" type="password" autocomplete="new-password">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-reg" onclick="LP.regStart()">Registrieren</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screenLogin()">Bereits ein Konto? Anmelden</button>'
    );
    focus('f-reg-email');
  }

  async function regStart() {
    hideErr('reg-err');
    var email = (document.getElementById('f-reg-email').value || '').trim();
    var name  = (document.getElementById('f-reg-name').value || '').trim();
    var pw    = document.getElementById('f-reg-pw').value;
    if (!email || !name || !pw) { showErr('Alle Felder ausfüllen.', 'reg-err'); return; }
    if (pw.length < 8) { showErr('Passwort muss mind. 8 Zeichen haben.', 'reg-err'); return; }
    _reg.email = email;
    _reg.name  = name;
    disable('btn-reg');
    var r = await api('POST', 'auth/register-start', { email: email, name: name, passwort: pw });
    enable('btn-reg');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reg-err'); return; }
    screenRegVerify();
  }

  function screenRegVerify() {
    h(logoHtml() + titleHtml('E-Mail bestätigen') +
      '<div class="msg-info">Wir haben einen Code an <strong>' + esc(_reg.email) + '</strong> gesendet.</div>' +
      errHtml('reg-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reg-code">Bestätigungscode</label>' +
        '<input class="field-input" id="f-reg-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-regv" onclick="LP.regVerify()">Bestätigen</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screenRegister()">&larr; Zurück</button>'
    );
    focus('f-reg-code');
    document.getElementById('f-reg-code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.regVerify();
    });
  }

  async function regVerify() {
    hideErr('reg-err');
    var code = (document.getElementById('f-reg-code').value || '').trim();
    if (!code) { showErr('Bitte Code eingeben.', 'reg-err'); return; }
    disable('btn-regv');
    var r = await api('POST', 'auth/register-verify-email', { email: _reg.email, code: code });
    enable('btn-regv');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reg-err'); return; }
    screenRegTotp();
  }

  async function screenRegTotp() {
    h(logoHtml() + titleHtml('2FA einrichten') +
      '<div style="text-align:center;padding:20px 0"><div class="spinner"></div></div>'
    );
    var r = await api('POST', 'auth/register-totp-init', { email: _reg.email });
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reg-err'); screenRegister(); return; }
    var d = r.data;
    h(logoHtml() + titleHtml('Authenticator einrichten') +
      '<div class="msg-info">Scanne den QR-Code mit deiner Authenticator-App.</div>' +
      '<div class="qr-wrap"><img src="' + esc(d.qr_url) + '" alt="QR"></div>' +
      '<div class="secret-box"><span>' + esc(d.secret) + '</span></div>' +
      errHtml('reg-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reg-totp">Code aus der App</label>' +
        '<input class="field-input" id="f-reg-totp" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-regt" onclick="LP.regTotpConfirm()">Bestätigen</button>' +
      '<button class="btn-link" style="display:block;text-align:center;margin-top:12px" onclick="LP.regSkipTotp()">Später einrichten</button>'
    );
    focus('f-reg-totp');
    document.getElementById('f-reg-totp').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') LP.regTotpConfirm();
    });
  }

  async function regTotpConfirm() {
    hideErr('reg-err');
    var code = (document.getElementById('f-reg-totp').value || '').trim();
    if (!code) { showErr('Bitte Code eingeben.', 'reg-err'); return; }
    disable('btn-regt');
    var r = await api('POST', 'auth/register-totp-confirm', { email: _reg.email, code: code });
    enable('btn-regt');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reg-err'); return; }
    screenRegDone(r.data);
  }

  async function regSkipTotp() {
    var r = await api('POST', 'auth/register-skip-totp', { email: _reg.email });
    if (!r || !r.ok) { alert((r && r.fehler) || 'Fehler'); return; }
    screenRegDone(r.data);
  }

  function screenRegDone(data) {
    var hasBackup = data && data.backup_codes && data.backup_codes.length;
    var autoFreigabe = data && data.auto_freigabe;

    var html = logoHtml();
    if (hasBackup) {
      var grid = data.backup_codes.map(function(c){ return '<div class="backup-code">' + esc(c) + '</div>'; }).join('');
      html += titleHtml('Backup-Codes sichern') +
        '<div class="msg-info">Speichere diese Codes sicher ab!</div>' +
        '<div class="backup-grid">' + grid + '</div>';
    }

    if (autoFreigabe) {
      html += '<div class="msg-info" style="margin-top:16px">Dein Konto wurde erstellt. Du kannst dich jetzt anmelden.</div>';
    } else {
      html += '<div class="msg-info" style="margin-top:16px">Deine Registrierung wurde eingereicht und muss noch von einem Administrator freigeschaltet werden.</div>';
    }
    html += '<button class="btn btn-primary" style="margin-top:16px" onclick="LP.screenLogin()">Zum Login</button>';
    h(html);
  }

  // ══════════════════════════════════════════════════════
  // PASSWORT-RESET
  // ══════════════════════════════════════════════════════
  var _reset = { email: '', step: 1 };

  function screenReset() {
    _reset = { email: '', step: 1 };
    h(logoHtml() + titleHtml('Passwort zurücksetzen') +
      errHtml('reset-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reset-email">E-Mail-Adresse</label>' +
        '<input class="field-input" id="f-reset-email" type="email" placeholder="name@beispiel.de">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-reset" onclick="LP.resetRequest()">Code anfordern</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screenLogin()">&larr; Zum Login</button>'
    );
    focus('f-reset-email');
  }

  async function resetRequest() {
    hideErr('reset-err');
    var email = (document.getElementById('f-reset-email').value || '').trim();
    if (!email) { showErr('Bitte E-Mail eingeben.', 'reset-err'); return; }
    _reset.email = email;
    disable('btn-reset');
    var r = await api('POST', 'auth/reset-request', { email: email });
    enable('btn-reset');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reset-err'); return; }
    screenResetVerify();
  }

  function screenResetVerify() {
    h(logoHtml() + titleHtml('Neues Passwort setzen') +
      '<div class="msg-info">Falls ein Konto mit dieser Adresse existiert, haben wir einen Code gesendet.</div>' +
      errHtml('reset-err') +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reset-code">Reset-Code</label>' +
        '<input class="field-input" id="f-reset-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:4px">' +
      '</div>' +
      '<div class="field-group">' +
        '<label class="field-label" for="f-reset-pw">Neues Passwort (mind. 8 Zeichen)</label>' +
        '<input class="field-input" id="f-reset-pw" type="password" autocomplete="new-password">' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-resetv" onclick="LP.resetVerify()">Passwort ändern</button>' +
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="LP.screenReset()">&larr; Zurück</button>'
    );
    focus('f-reset-code');
  }

  async function resetVerify() {
    hideErr('reset-err');
    var code = (document.getElementById('f-reset-code').value || '').trim();
    var pw   = document.getElementById('f-reset-pw').value;
    if (!code || !pw) { showErr('Alle Felder ausfüllen.', 'reset-err'); return; }
    if (pw.length < 8) { showErr('Passwort muss mind. 8 Zeichen haben.', 'reset-err'); return; }
    disable('btn-resetv');
    var r = await api('POST', 'auth/reset-verify', { email: _reset.email, code: code, passwort: pw });
    enable('btn-resetv');
    if (!r || !r.ok) { showErr((r && r.fehler) || 'Fehler', 'reset-err'); return; }
    h(logoHtml() + titleHtml('Passwort geändert') +
      '<div class="msg-info">Dein Passwort wurde erfolgreich geändert.</div>' +
      '<button class="btn btn-primary" onclick="LP.screenLogin()">Jetzt anmelden</button>'
    );
  }

  // ══════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════
  async function init() {
    // Config laden
    var cr = await api('GET', 'einstellungen', null);
    if (cr && cr.ok) {
      config = cr.data;
      applyColors();
      // Apps parsen
      try { apps = JSON.parse(config.login_portal_apps || '[]'); } catch(e) { apps = []; }
    }

    // Session prüfen
    var mr = await api('GET', 'auth/me', null);
    if (mr && mr.ok) {
      currentUser = mr.data;
      if (redirectUrl) {
        // Bereits eingeloggt → direkt weiterleiten
        window.location.href = redirectUrl;
        return;
      }
      screenAppSelector();
    } else {
      screenLogin();
    }
  }

  // ── Public API ─────────────────────────────────────────
  window.LP = {
    screenLogin: screenLogin,
    screenRegister: screenRegister,
    screenReset: screenReset,
    doIdentify: doIdentify,
    doLogin: doLogin,
    doPasskeyAuth: doPasskeyAuth,
    screen2FA: screen2FA,
    _2fa: _2fa,
    show2FACode: show2FACode,
    verifyTotp: verifyTotp,
    sendEmailCode: sendEmailCode,
    verifyEmailCode: verifyEmailCode,
    confirmTotpSetup: confirmTotpSetup,
    loginSuccess: loginSuccess,
    doLogout: doLogout,
    regStart: regStart,
    regVerify: regVerify,
    regTotpConfirm: regTotpConfirm,
    regSkipTotp: regSkipTotp,
    resetRequest: resetRequest,
    resetVerify: resetVerify,
    copySecret: copySecret,
  };

  // Start
  init();
})();
</script>
</body>
</html>
